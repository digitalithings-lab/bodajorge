<section class="py-16 md:py-24 bg-[#F5F2EA]">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 text-center">
    <svg class="w-8 h-8 sm:w-10 sm:h-10 text-[#8F9779] mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>
    </svg>
    <h2 class="font-serif text-3xl sm:text-4xl md:text-5xl mb-4 text-[#333]">Dress Code</h2>
    <p class="font-sans font-semibold text-[#333] tracking-widest uppercase mb-4 text-sm sm:text-base">
      Formal / Etiqueta
    </p>
    <p class="font-sans font-light text-gray-600 text-sm sm:text-base mb-12 max-w-2xl mx-auto px-4">
      Nos encantaría verlos lucir espectaculares en nuestro gran día. <br class="hidden sm:block"/>
      <span class="font-medium text-[#8F9779] block mt-2">* Por favor, reservar los tonos blancos y crema exclusivamente para la novia.</span>
    </p>

    <div class="grid md:grid-cols-2 gap-10 md:gap-16">
      <!-- Damas -->
      <div class="flex flex-col items-center bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-gray-100">
        <h4 class="font-serif text-2xl sm:text-3xl mb-2 text-[#333]">Damas</h4>
        <p class="font-sans font-light text-gray-500 text-xs sm:text-sm mb-6">Vestido largo de noche</p>
        
        <!-- Carrusel Damas -->
        <div class="relative w-full aspect-[4/5] overflow-hidden rounded-2xl mb-6 shadow-inner bg-gray-100">
            <img *ngFor="let img of damasImages; let i = index"
              [src]="img" 
              alt="Referencia vestido damas" 
              class="absolute inset-0 w-full h-full object-cover object-top transition-opacity duration-1000 ease-in-out"
              [class.opacity-100]="i === currentDamaImg()"
              [class.opacity-0]="i !== currentDamaImg()"
            />
        </div>

        <!-- Paleta Damas -->
        <p class="font-sans text-[10px] sm:text-xs uppercase tracking-[0.2em] text-gray-400 mb-3">Colores sugeridos</p>
        <div class="flex gap-3 sm:gap-4 flex-wrap justify-center">
          <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#2A3B32] shadow-md border border-gray-100" title="Verde Bosque"></div>
          <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#1A2B4C] shadow-md border border-gray-100" title="Azul Marino"></div>
          <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#5C2C35] shadow-md border border-gray-100" title="Vino / Borgoña"></div>
          <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#DCAE96] shadow-md border border-gray-100" title="Palo de Rosa"></div>
          <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#111111] shadow-md border border-gray-100" title="Negro"></div>
        </div>
      </div>

      <!-- Caballeros -->
      <div class="flex flex-col items-center bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-gray-100">
        <h4 class="font-serif text-2xl sm:text-3xl mb-2 text-[#333]">Caballeros</h4>
        <p class="font-sans font-light text-gray-500 text-xs sm:text-sm mb-6">Traje oscuro y corbata</p>
        
        <!-- Carrusel Caballeros -->
        <div class="relative w-full aspect-[4/5] overflow-hidden rounded-2xl mb-6 shadow-inner bg-gray-100">
            <img *ngFor="let img of caballerosImages; let i = index"
              [src]="img" 
              alt="Referencia traje caballeros" 
              class="absolute inset-0 w-full h-full object-cover object-center transition-opacity duration-1000 ease-in-out"
              [class.opacity-100]="i === currentCaballeroImg()"
              [class.opacity-0]="i !== currentCaballeroImg()"
            />
        </div>

        <!-- Paleta Caballeros -->
        <p class="font-sans text-[10px] sm:text-xs uppercase tracking-[0.2em] text-gray-400 mb-3">Colores sugeridos</p>
        <div class="flex gap-3 sm:gap-4 flex-wrap justify-center">
          <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#111111] shadow-md border border-gray-100" title="Negro"></div>
          <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#1A2B4C] shadow-md border border-gray-100" title="Azul Marino"></div>
          <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#36454F] shadow-md border border-gray-100" title="Gris Oxford"></div>
        </div>
      </div>
    </div>
  </div>
</section>
